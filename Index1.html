<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DecodeLabs</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green: #00ff88;
      --dark: #020c06;
      --mid: #061a0e;
      --glow: 0 0 20px #00ff8877, 0 0 60px #00ff8833;
    }

    body {
      background: var(--dark);
      color: #c8ffd8;
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,136,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Scanline effect */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.15) 2px,
        rgba(0,0,0,0.15) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      gap: 32px;
    }

    /* Top bar */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
      animation: scanBar 3s linear infinite;
      z-index: 10;
    }

    @keyframes scanBar {
      0% { background-position: -100% 0; }
      100% { background-position: 200% 0; }
    }

    /* Badge */
    .badge {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--green);
      border: 1px solid rgba(0,255,136,0.3);
      padding: 6px 18px;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.3s;
    }

    /* Logo */
    .logo {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: clamp(42px, 10vw, 96px);
      letter-spacing: -2px;
      color: var(--green);
      text-shadow: var(--glow);
      line-height: 1;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.6s;
      position: relative;
    }

    .logo span {
      color: #ffffff22;
      text-shadow: none;
    }

    /* Glitch effect on hover */
    .logo:hover {
      animation: glitch 0.3s linear, fadeUp 0s forwards;
    }

    @keyframes glitch {
      0%   { transform: translate(0); }
      20%  { transform: translate(-3px, 2px); filter: hue-rotate(90deg); }
      40%  { transform: translate(3px, -2px); }
      60%  { transform: translate(-2px, 0); filter: hue-rotate(-90deg); }
      80%  { transform: translate(2px, 2px); }
      100% { transform: translate(0); filter: none; }
    }

    /* Tagline */
    .tagline {
      font-size: clamp(13px, 2.5vw, 18px);
      letter-spacing: 3px;
      color: rgba(200,255,216,0.6);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.9s;
    }

    /* Mission card */
    .card {
      background: rgba(0,255,136,0.04);
      border: 1px solid rgba(0,255,136,0.2);
      padding: 36px 48px;
      max-width: 620px;
      width: 100%;
      text-align: center;
      position: relative;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.2s;
    }

    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      border-color: var(--green);
      border-style: solid;
    }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .mission-label {
      font-size: 10px;
      letter-spacing: 5px;
      color: var(--green);
      text-transform: uppercase;
      margin-bottom: 16px;
      opacity: 0.7;
    }

    .mission-text {
      font-family: 'Orbitron', monospace;
      font-size: clamp(18px, 4vw, 28px);
      font-weight: 700;
      color: #ffffff;
      line-height: 1.4;
      text-shadow: 0 0 30px rgba(0,255,136,0.3);
    }

    .mission-text .highlight {
      color: var(--green);
      text-shadow: var(--glow);
    }

    /* Status row */
    .status-row {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.5s;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      letter-spacing: 2px;
      color: rgba(200,255,216,0.5);
      text-transform: uppercase;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    /* Hania credit — subtle fade */
    .credit {
      position: fixed;
      bottom: 28px;
      right: 32px;
      font-size: 11px;
      letter-spacing: 3px;
      color: rgba(0,255,136,0.18);
      font-family: 'Space Mono', monospace;
      text-transform: uppercase;
      animation: breathe 4s ease-in-out infinite 2s;
      z-index: 5;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.12; }
      50% { opacity: 0.45; }
    }

    /* Terminal line */
    .terminal {
      font-size: 13px;
      color: rgba(0,255,136,0.5);
      letter-spacing: 1px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.8s;
    }

    .cursor {
      display: inline-block;
      width: 9px; height: 14px;
      background: var(--green);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Decorative side lines */
    .side-line {
      position: fixed;
      top: 0; bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(0,255,136,0.15), transparent);
    }
    .side-line.left  { left: 32px; }
    .side-line.right { right: 32px; }
  </style>
</head>
<body>

  <div class="topbar"></div>
  <div class="side-line left"></div>
  <div class="side-line right"></div>

  <div class="container">

    <div class="badge">// AWS Cloud Lab · EC2 Instance Active</div>

    <div class="logo">Decode<span>Labs</span></div>

    <div class="tagline">Engineering the Future, One Deploy at a Time</div>

    <div class="card">
      <div class="mission-label">// System Status</div>
      <div class="mission-text">
        Mission <span class="highlight">Accomplished</span><br/>
        Server is Live &amp; Online
      </div>
    </div>

    <div class="status-row">
      <div class="status-item"><div class="dot"></div> Nginx Running</div>
      <div class="status-item"><div class="dot" style="animation-delay:.4s"></div> EC2 Connected</div>
      <div class="status-item"><div class="dot" style="animation-delay:.8s"></div> HTTP Port 80 Open</div>
    </div>

    <div class="terminal">
      $ echo "deployed by hania" <span class="cursor"></span>
    </div>

  </div>

  <!-- Hania's name — subtle fade ghost signature -->
  <div class="credit">crafted by Hania &nbsp;✦</div>

</body>
</html>
